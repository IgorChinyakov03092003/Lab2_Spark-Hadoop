services:
  namenode:
    image: apache/hadoop:3.4
    container_name: namenode
    volumes:
      - "./data:/data"
    ports:
      - "9870:9870" # веб-интерфейс
      - "9000:9000" # внешний порт
    command: bash -c "hdfs namenode -format lab_cluster -force -nonInteractive || true && hdfs namenode"
    environment:
      CORE-SITE.XML_fs.defaultFS: "hdfs://namenode:9000"
      HDFS-SITE.XML_dfs.replication: ${REPLICATION_FACTOR:-1}
      HADOOP_HEAPSIZE_MAX: 1g
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  datanode:
    image: apache/hadoop:3.4
    command: ["hdfs", "datanode"]
    environment:
      CORE-SITE.XML_fs.defaultFS: "hdfs://namenode:9000"
      HDFS-SITE.XML_dfs.replication: ${REPLICATION_FACTOR:-1}
      HADOOP_HEAPSIZE_MAX: 1g
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1g

  spark-master:
    image: apache/spark:4.0.2
    container_name: spark-master
    # взял с гайда
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080" # порт для просмотра воркеров
      - "7077:7077" # внутренний порт для связи с воркерами
      - "4041:4040" # Web UI самого приложения (Драйвера)
    volumes:
      - "./data:/data"
      - "./src:/src"
      - "./report:/report"
    deploy:
      resources:
        limits:
          cpus: '1.0' # больше нам не надо
          memory: 1G

  spark-worker:
    image: apache/spark:4.0.2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=4G
    depends_on:
      - spark-master
    volumes:
      - "./data:/data"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G # так много нужно, чтобы запустить --multiply 3
